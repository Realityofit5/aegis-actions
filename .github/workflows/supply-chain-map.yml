name: Supply Chain Mapping

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'Repository to analyze (owner/name)'
        required: true
      ecosystem:
        description: 'Package ecosystem'
        required: true
        default: 'pip'
        type: choice
        options:
          - pip
          - npm
          - cargo

jobs:
  map:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract Dependencies
        run: |
          REPO="${{ github.event.inputs.repo }}"
          ECOSYSTEM="${{ github.event.inputs.ecosystem }}"
          echo "=== Supply Chain Map: $REPO ===" > supply_chain.txt
          echo "Ecosystem: $ECOSYSTEM" >> supply_chain.txt
          echo "Date: $(date -u)" >> supply_chain.txt
          echo "" >> supply_chain.txt

          # Try SBOM first
          echo "--- SBOM (Software Bill of Materials) ---" >> supply_chain.txt
          gh api "repos/$REPO/dependency-graph/sbom" --jq '.sbom.packages[] | "\(.name) | \(.versionInfo // "?")"' >> supply_chain.txt 2>&1 || echo "SBOM not available" >> supply_chain.txt
          echo "" >> supply_chain.txt

          # Get dependency files directly
          echo "--- Dependency Files ---" >> supply_chain.txt
          if [ "$ECOSYSTEM" = "pip" ]; then
            gh api "repos/$REPO/contents/requirements.txt" --jq '.content' 2>/dev/null | base64 -d >> supply_chain.txt 2>&1 || true
            gh api "repos/$REPO/contents/pyproject.toml" --jq '.content' 2>/dev/null | base64 -d >> supply_chain.txt 2>&1 || true
          elif [ "$ECOSYSTEM" = "npm" ]; then
            gh api "repos/$REPO/contents/package.json" --jq '.content' 2>/dev/null | base64 -d >> supply_chain.txt 2>&1 || true
          elif [ "$ECOSYSTEM" = "cargo" ]; then
            gh api "repos/$REPO/contents/Cargo.toml" --jq '.content' 2>/dev/null | base64 -d >> supply_chain.txt 2>&1 || true
          fi
          echo "" >> supply_chain.txt

      - name: Map Maintainers
        run: |
          REPO="${{ github.event.inputs.repo }}"
          echo "--- Dependency Maintainer Mapping ---" >> supply_chain.txt

          # Get contributors of the main repo
          echo "Main repo contributors:" >> supply_chain.txt
          gh api "repos/$REPO/contributors?per_page=10" --jq '.[] | "\(.login) (contributions: \(.contributions))"' >> supply_chain.txt 2>&1 || true
          echo "" >> supply_chain.txt

          # Check for known vulnerability alerts
          echo "--- Security Advisories ---" >> supply_chain.txt
          gh api "repos/$REPO/dependabot/alerts?state=open&per_page=20" --jq '.[] | "\(.security_advisory.summary) | Severity: \(.security_advisory.severity) | Package: \(.dependency.package.name)"' >> supply_chain.txt 2>&1 || echo "No Dependabot alerts or insufficient permissions" >> supply_chain.txt
          echo "" >> supply_chain.txt

      - name: AI Risk Analysis
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull phi3:mini

          DATA=$(cat supply_chain.txt)
          ollama run phi3:mini "You are a supply chain security analyst. Analyze this dependency data and identify: 1) Single-maintainer risks 2) Outdated or unmaintained dependencies 3) Known vulnerabilities 4) Transitive dependency risks 5) Risk score (1-10) with reasoning. Data: $DATA" > supply_chain_ai.txt 2>&1
          cat supply_chain_ai.txt

      - name: Save Results
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-${{ github.run_number }}
          path: |
            supply_chain.txt
            supply_chain_ai.txt
          retention-days: 90
