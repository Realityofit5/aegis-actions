name: Trend Scanner

on:
  workflow_dispatch:
    inputs:
      niche:
        description: 'Niche or topic to scan'
        required: true
        default: 'AI tools and automation'
  schedule:
    # Daily at 8 AM UTC
    - cron: '0 8 * * *'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install Tools
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull dolphin-mistral
          pip install requests

      - name: Scan GitHub Trending
        run: |
          NICHE="${{ github.event.inputs.niche || 'AI tools and automation' }}"
          echo "=== TREND SCAN: $NICHE ===" > trends.txt
          echo "Date: $(date -u)" >> trends.txt
          echo "" >> trends.txt

          echo "--- GitHub Trending Repos ---" >> trends.txt
          python3 -c "
          import requests
          r = requests.get('https://api.github.com/search/repositories?q=stars:>100+pushed:>$(date -d \"-7 days\" +%Y-%m-%d 2>/dev/null || date -v-7d +%Y-%m-%d 2>/dev/null || echo 2026-03-25)&sort=stars&per_page=15')
          if r.ok:
              for repo in r.json().get('items', []):
                  print(f\"{repo['full_name']} | {repo['stargazers_count']} stars | {repo['language'] or 'N/A'} | {repo['description'][:80] if repo['description'] else ''}\")
          " >> trends.txt 2>&1 || true
          echo "" >> trends.txt

          echo "--- Recent High-Star Repos ---" >> trends.txt
          gh api search/repositories --method GET -f q="$NICHE created:>2026-01-01" -f sort=stars -f per_page=10 --jq '.items[] | "\(.full_name) | \(.stargazers_count) stars | \(.description // "" | .[:80])"' >> trends.txt 2>&1 || true
          echo "" >> trends.txt
        env:
          GH_TOKEN: ${{ github.token }}

      - name: AI Trend Analysis
        run: |
          NICHE="${{ github.event.inputs.niche || 'AI tools and automation' }}"
          DATA=$(cat trends.txt)

          ollama run dolphin-mistral "You are an internet trend analyst and opportunity scout. Analyze this data about trending repos and the niche '$NICHE'.

          Provide:
          1. SIGNALS — What patterns do you see? What's gaining momentum?
          2. GAPS — What's missing? What should exist but doesn't?
          3. OPPORTUNITIES — How can someone leverage these trends for income/influence?
          4. PREDICTIONS — What will blow up in the next 30 days?
          5. ACTION ITEMS — Top 3 things to do THIS WEEK based on these signals

          Data: $DATA" > trend_analysis.txt 2>&1
          cat trend_analysis.txt

      - name: Save Results
        uses: actions/upload-artifact@v4
        with:
          name: trends-${{ github.run_number }}
          path: |
            trends.txt
            trend_analysis.txt
          retention-days: 90
